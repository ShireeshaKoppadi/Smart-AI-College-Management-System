<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3>Edit Student</h3>
        </div>

        <div class="card-body">

            <form action="/update_student/{{ student[0] }}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text"
                           class="form-control"
                           name="name"
                           value="{{ student[1] }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Roll Number</label>
                    <input type="text"
                           class="form-control"
                           name="roll"
                           value="{{ student[2] }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Branch</label>

                    <select class="form-select" name="branch">

                        <option {% if student[3]=='AI & DS' %}selected{% endif %}>AI & DS</option>
                        <option {% if student[3]=='CSE' %}selected{% endif %}>CSE</option>
                        <option {% if student[3]=='ECE' %}selected{% endif %}>ECE</option>
                        <option {% if student[3]=='EEE' %}selected{% endif %}>EEE</option>
                        <option {% if student[3]=='IT' %}selected{% endif %}>IT</option>

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Year</label>

                    <select class="form-select" name="year">

                        <option {% if student[4]==1 %}selected{% endif %}>1</option>
                        <option {% if student[4]==2 %}selected{% endif %}>2</option>
                        <option {% if student[4]==3 %}selected{% endif %}>3</option>
                        <option {% if student[4]==4 %}selected{% endif %}>4</option>

                    </select>

                </div>

                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text"
                           class="form-control"
                           name="phone"
                           value="{{ student[5] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           class="form-control"
                           name="email"
                           value="{{ student[6] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">CGPA</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="cgpa"
                           value="{{ student[7] }}">
                </div>

                <button type="submit" class="btn btn-warning">
                    Update Student
                </button>

                <a href="/students" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
